<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Token Explorer</title>
    </head>

    <body>
        <h2>Token Explorer</h2>

        <h4>
            Please provide the text to be tokenized:
        </h4>
        <textarea
            id="text-input"
            rows="5"
            cols="60"></textarea>

        <h4>
            Please provide number of merges to be performed:
        </h4>
        <input
            type="number"
            id="merge-count"
            value="1"
            min="1">

        <button id="tokenize-btn">
            Tokenize
        </button>

        <h3>
            Word Tokens:
            <span id="word-count"></span>
        </h3>
        <div id="word-output"></div>

        <h3>
            Character Tokens:
            <span id="character-count"></span>
        </h3>
        <div id="character-output"></div>

        <h3>
            Character BPE:
            <span id="character-bpe-count"></span>
        </h3>
        <div id="character-bpe-output"></div>

        <h3>
            Byte-Level BPE:
            <span id="byte-bpe-count"></span>
        </h3>
        <div id="byte-bpe-output"></div>

        <!--JS-->
        <script src="script.js"></script>

    </body>
</html>
