<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Route Optimizer</title>

        <!-- Leaflet CSS -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""/>

        <!-- CSS -->
        <link rel="stylesheet" href="styles.css">

        <!-- Font -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    </head>

    <body>
        <div id="app">
            <div id="sidebar">
                <h2>Route Optimizer</h2>

                <label>Map</label>
                <select id="mapSelector">
                    <option value="grid_10">Grid 10</option>
                    <option value="grid_50">Grid 50</option>
                    <option value="osm_manhattan">Manhattan (OSM)</option>
                    <option value="osm_nyc" disabled>NYC (OSM)</option>
                </select>

                <button onclick="resetMap()">Reset</button>

                <p id="distance">Distance: --</p>
                <p id="loading">Calculating route...</p>

                <!-- Legend -->
                <div id="legend">
                    <h3>Legend</h3>

                    <div class="legend-item">
                        <span class="legend-color start"></span>
                        Start
                    </div>

                    <div class="legend-item">
                        <span class="legend-color end"></span>
                        End
                    </div>

                    <div class="legend-item">
                        <span class="legend-color route"></span>
                        Route
                    </div>
                </div>

                <button id="login-btn">Login</button>
                <button id="logout-btn" style="display:none;">Logout</button>

                <p id="status">Checking...</p>
            </div>

            <div id="map"></div>
        </div>

        <!-- Floating Message -->
        <div id="message"></div>

        <!-- Leaflet JS -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin="">
        </script>

        <!-- JS -->
        <script src="script.js"></script>

    </body>
</html>
